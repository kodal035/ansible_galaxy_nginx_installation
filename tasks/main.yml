---
- name: Ensure apt cache is updated
  apt:
    update_cache: yes
    cache_valid_time: 3600

- name: Ensure Nginx is installed
  apt:
    name: "{{ nginx_package }}"
    state: present

- name: Ensure Nginx service is enabled and started
  service:
    name: "{{ nginx_service }}"
    state: started
    enabled: yes

- name: Ensure Nginx web root exists
  file:
    path: "{{ nginx_web_root }}"
    state: directory
    owner: www-data
    group: www-data
    mode: "0755"

- name: Publish index.html
  copy:
    src: "{{ nginx_index_src }}"
    dest: "{{ nginx_web_root }}/index.html"
    owner: www-data
    group: www-data
    mode: "0644"
  notify: restart nginx
