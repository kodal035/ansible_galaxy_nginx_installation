---
- name: Deploy index.html to Nginx servers
  hosts: server-01
  become: yes
  tasks:
    - name: Check if nginx is installed
      command: which nginx
      register: nginx_check
      ignore_errors: yes
    
    - name: Update package cache
      apt:
        update_cache: yes
      when: nginx_check.rc != 0
    
    - name: Install nginx
      apt:
        name: nginx
        state: present
      when: nginx_check.rc != 0
    
    - name: Start and enable nginx
      service:
        name: nginx
        state: started
        enabled: yes
      when: nginx_check.rc != 0
    
    - name: Create nginx web root directory
      file:
        path: /var/www/html
        state: directory
        owner: www-data
        group: www-data
        mode: '0755'
    
    - name: Copy index.html to web root
      copy:
        src: /mnt/c/Users/abdul/ansible-documents/index.html
        dest: /var/www/html/index.html
        owner: www-data
        group: www-data
        mode: '0644'
    
    - name: Restart nginx
      service:
        name: nginx
        state: restarted
    
    - name: Verify nginx status
      command: systemctl status nginx
      register: nginx_status
    
    - name: Show nginx status
      debug:
        msg: "{{ nginx_status.stdout }}"
    
    - name: Remove IP blocking from Nginx
      copy:
        content: |
          server {
              listen 80;
              server_name _;

              root /var/www/html;
              index index.html;

              location / {
                  try_files $uri $uri/ =404;
              }
          }
        dest: /etc/nginx/sites-available/default
        owner: root
        group: root
        mode: '0644'
    
    - name: Test and reload Nginx
      shell: |
        nginx -t && systemctl reload nginx
      register: reload_result
    
    - name: Show reload result
      debug:
        msg: "IP blocking removed from Nginx"